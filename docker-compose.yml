services:
  cli-proxy-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    environment:
      DEPLOY: cloud
    ports:
      - "8317:8317"
    volumes:
      - "../files/auths:/root/.cli-proxy-api"
      - "../files/logs:/CLIProxyAPI/logs"
    restart: unless-stopped
